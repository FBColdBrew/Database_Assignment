<!DOCTYPE html>
<html>
<head><title>Admin Panel</title></head>
<body style="font-family: sans-serif; background-color: #f4f7f6; padding: 20px;">
    <h1>🛡️ Admin Management Panel</h1>
    <a href="/logout" style="color: red;">[ Log Out ]</a>
    <hr>

    <div style="display: flex; gap: 20px;">
        <div style="flex: 1; background: white; padding: 15px; border-radius: 8px;">
            <h3>📚 Manage Books & Genres</h3>
            <form action="/add_book" method="POST">
                <input type="text" name="title" placeholder="Book Title" required>
                <input type="text" name="genre" placeholder="Genre">
                <button type="submit">Add Book</button>
            </form>
            <ul>
                {% for book in books %}
                <li>{{ book.Title }} ({{ book.Genre }}) - <b>{{ book.Status }}</b></li>
                {% endfor %}
            </ul>
        </div>

        <div style="flex: 1; background: white; padding: 15px; border-radius: 8px;">
            <h3>👥 Manage Users & Fees</h3>
            <table border="1" width="100%">
                <tr><th>User</th><th>Role</th><th>Fees</th></tr>
                {% for user in users %}
                <tr>
                    <td>{{ user.Username }}</td>
                    <td>{{ user.Role }}</td>
                    <td>RM 0.00 <button>Add Fee</button></td>
                </tr>
                {% endfor %}
            </table>
        </div>
    </div>
</body>
</html>
