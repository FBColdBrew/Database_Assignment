<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container dashboard-box">
        <div class="dashboard-header">
            <h2>Member Dashboard</h2>
            <div>
                <span style="font-weight: bold; margin-right: 15px;">Wallet: RM <span id="wallet-balance">20.00</span></span>
                <a href="/logout" class="btn-danger">Logout</a>
            </div>
        </div>

        <div class="nav-tabs">
            <button onclick="showTab('mem-search', this)" class="active">Search Book</button>
            <button onclick="showTab('mem-borrow', this)">Borrow Book</button>
            <button onclick="showTab('mem-return', this)">Return & Penalty</button>
            <button onclick="showTab('mem-wallet', this)">Reload Wallet</button>
            <button onclick="showTab('mem-account', this)">User Account</button>
        </div>

        <div id="mem-search" class="panel">
            <h3>Search Catalog</h3>
            <input type="text" placeholder="Enter book title...">
            <button>Search</button>
        </div>

        <div id="mem-borrow" class="panel hidden">
            <h3>Borrow a Book</h3>
            <label>Select Return Date:</label>
            <input type="date">
            <button>Confirm Borrow</button>
        </div>

        <div id="mem-return" class="panel hidden">
            <h3>Return Book & Penalties</h3>
            <p style="color: red; font-weight: bold;">Late Return Penalty: RM 5.00 per day</p>
            <table>
                <tr><th>Book Title</th><th>Due Date</th><th>Status</th><th>Action</th></tr>
                <tr><td>Digital Forensics</td><td>2026-05-01</td><td style="color:red;">2 Days Late (RM 10)</td><td><button>Pay & Return</button></td></tr>
            </table>
        </div>

        <div id="mem-wallet" class="panel hidden">
            <h3>Reload e-Wallet</h3>
            <input type="number" placeholder="Enter amount (RM)" min="5">
            <button>Top Up</button>
        </div>

        <div id="mem-account" class="panel hidden">
            <h3>Account Settings</h3>
            <input type="text" value="Student Bob" disabled>
            <input type="email" value="bob@student.mmu.edu.my" disabled>
            <button>Update Password</button>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
