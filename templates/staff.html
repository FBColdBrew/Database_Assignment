<!DOCTYPE html>
<html>
<head><title>Staff Dashboard</title></head>
<body style="background-color: #e6ffe6;"> <h1>📋 Library Desk Staff Dashboard</h1>
    <a href="/" style="color: red; font-weight: bold;">[ Logout ]</a>
    <hr>
    
    <h3>Manage Library Inventory</h3>
    <table border="1" cellpadding="5">
        <tr><th>Title</th><th>Author</th><th>Genre</th><th>Status</th></tr>
        {% for book in books %}
        <tr><td>{{ book.Title }}</td><td>{{ book.Author }}</td><td>{{ book.Genre }}</td><td>{{ book.Status }}</td></tr>
        {% endfor %}
    </table>
</body>
</html>
